<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#111111">
<title>BEASTBORNE - RPG Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Cinzel:wght@700;900&family=Sarabun:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
/* --- CORE STYLES --- */
:root {
  --bg: #0a0a0c; --panel: #16151a; --border: #3a2e24; --text: #e0d8c8;
  --gold: #c2a878; --gold-dim: #8a734d; --red: #cc3333; --green: #22c060; --blue: #3a90f0;
}
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body { background: var(--bg); color: var(--text); font-family: 'Sarabun', sans-serif; overflow-x: hidden; }
.app { max-width: 430px; margin: 0 auto; min-height: 100vh; position: relative; padding-bottom: 80px; }

/* --- HEADER --- */
.header {
  display: flex; justify-content: space-between; align-items: center; 
  padding: 20px; background: linear-gradient(180deg, rgba(0,0,0,0.9) 0%, transparent 100%);
}
.back-btn { color: var(--gold); text-decoration: none; font-size: 14px; font-weight: 700; border: 1px solid var(--gold-dim); padding: 5px 12px; border-radius: 4px; }
.title { font-family: 'Cinzel', serif; font-size: 20px; font-weight: 900; letter-spacing: 3px; color: var(--gold); text-shadow: 0 0 10px rgba(194,168,120,0.3); }

/* --- RPG HUD SYSTEM --- */
.rpg-hud {
  background: var(--panel); border: 2px solid var(--border); border-radius: 8px; padding: 15px;
  margin: 0 15px 20px; box-shadow: inset 0 0 30px rgba(0,0,0,0.8), 0 5px 15px rgba(0,0,0,0.6); position: relative;
}
.rpg-profile { display: flex; align-items: center; gap: 15px; margin-bottom: 15px; }
.rpg-avatar { 
  width: 55px; height: 55px; background: #000; border: 2px solid var(--gold); 
  border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 28px;
  box-shadow: 0 0 10px rgba(194,168,120,0.4);
}
.rpg-info { flex: 1; }
.rpg-name { font-family: 'Cinzel', serif; font-size: 18px; color: #fff; font-weight: 900; letter-spacing: 2px; }
.rpg-class { font-size: 11px; color: var(--blue); text-transform: uppercase; font-weight: 700; letter-spacing: 1px; }

.bar-container { margin-bottom: 10px; display: flex; align-items: center; gap: 10px; }
.bar-label { font-family: 'Bebas Neue', sans-serif; font-size: 16px; width: 35px; text-align: right; }
.bar-bg { flex: 1; height: 14px; background: #000; border: 1px solid #222; border-radius: 4px; overflow: hidden; box-shadow: inset 0 2px 5px rgba(0,0,0,0.9); }
.bar-fill { height: 100%; transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1); }
.bar-hp { background: linear-gradient(90deg, #8b0000, var(--red)); }
.bar-exp { background: linear-gradient(90deg, #b8860b, #ffd700); }

.rpg-stats {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; 
  background: rgba(0,0,0,0.6); padding: 12px; border-radius: 6px; border: 1px solid #2a2a2a; margin-top: 15px;
}
.stat-box { text-align: center; }
.stat-val { font-family: 'Bebas Neue', sans-serif; font-size: 22px; color: #fff; line-height: 1;}
.stat-lbl { font-size: 9px; color: #888; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; margin-top: 4px;}

/* --- ACTION BUTTON --- */
.action-area { padding: 0 15px; margin-bottom: 25px; }
.btn-quest {
  width: 100%; background: linear-gradient(135deg, #4a3b2c, #2a2015); border: 2px solid var(--gold);
  color: var(--gold); font-family: 'Cinzel', serif; font-size: 16px; font-weight: 900; letter-spacing: 2px;
  padding: 16px; border-radius: 8px; cursor: pointer; text-shadow: 0 2px 4px rgba(0,0,0,0.8);
  box-shadow: 0 4px 15px rgba(0,0,0,0.4); transition: all 0.2s;
}
.btn-quest:active { transform: scale(0.97); box-shadow: 0 2px 5px rgba(0,0,0,0.5); }
.btn-quest.has-pending { background: linear-gradient(135deg, #1e4d2b, #0f2b16); border-color: var(--green); color: #fff; animation: pulseGlow 2s infinite; }
@keyframes pulseGlow { 0%, 100% { box-shadow: 0 0 5px rgba(34,192,96,0.3); } 50% { box-shadow: 0 0 20px rgba(34,192,96,0.8); } }

/* --- QUEST LOG (HISTORY) --- */
.log-section { padding: 0 15px; }
.log-title { font-family: 'Cinzel', serif; font-size: 14px; color: var(--gold-dim); letter-spacing: 2px; border-bottom: 1px solid var(--border); padding-bottom: 8px; margin-bottom: 15px; }
.quest-card {
  background: var(--panel); border: 1px solid #2a2a2a; border-radius: 8px; padding: 15px; margin-bottom: 12px;
  display: flex; gap: 15px; align-items: center;
}
.quest-icon { font-size: 28px; background: rgba(0,0,0,0.5); width: 50px; height: 50px; border-radius: 8px; display: flex; align-items: center; justify-content: center; border: 1px solid #333; }
.quest-details { flex: 1; }
.q-head { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 5px; }
.q-dist { font-family: 'Bebas Neue', sans-serif; font-size: 24px; color: var(--gold); line-height: 1; }
.q-date { font-size: 10px; color: #777; }
.q-stats { display: flex; gap: 10px; font-size: 11px; color: #aaa; font-weight: 600; margin-bottom: 5px; }
.q-stats span { color: #fff; }
.q-note { font-size: 11px; color: #888; font-style: italic; background: #000; padding: 6px; border-radius: 4px; border-left: 2px solid var(--blue); }

/* --- MODAL FORM --- */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(4px);
  z-index: 1000; display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.3s;
}
.modal-overlay.active { opacity: 1; pointer-events: all; }
.modal-box {
  background: var(--panel); border: 2px solid var(--border); width: 90%; max-width: 360px;
  border-radius: 8px; padding: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.8); transform: translateY(20px); transition: transform 0.3s;
}
.modal-overlay.active .modal-box { transform: translateY(0); }
.m-title { font-family: 'Cinzel', serif; font-size: 18px; color: var(--gold); text-align: center; margin-bottom: 15px; border-bottom: 1px solid #333; padding-bottom: 10px; }
.sync-alert { background: rgba(34,192,96,0.1); border: 1px solid var(--green); color: var(--green); padding: 10px; border-radius: 6px; font-size: 11px; margin-bottom: 15px; font-weight: 700; text-align: center; display: none; }
.input-group { margin-bottom: 15px; }
.input-group label { display: block; font-size: 11px; color: #aaa; margin-bottom: 5px; font-weight: 700; text-transform: uppercase; }
.rpg-input { width: 100%; background: #000; border: 1px solid #333; color: #fff; padding: 12px; border-radius: 6px; font-family: 'Sarabun', sans-serif; font-size: 16px; outline: none; }
.rpg-input:focus { border-color: var(--gold); }
.rpg-input:disabled { opacity: 0.6; cursor: not-allowed; border-color: var(--green); color: var(--green); }
.btn-submit { width: 100%; background: var(--gold); color: #000; border: none; padding: 14px; font-family: 'Cinzel', serif; font-size: 16px; font-weight: 900; border-radius: 6px; cursor: pointer; margin-top: 10px; }
.btn-cancel { width: 100%; background: transparent; color: #888; border: none; padding: 10px; font-size: 12px; margin-top: 5px; cursor: pointer; text-decoration: underline; }

/* --- TOAST --- */
#toast {
  position: fixed; top: 20px; left: 50%; transform: translate(-50%, -20px);
  background: var(--panel); border: 1px solid var(--gold); color: #fff; padding: 12px 24px;
  border-radius: 50px; font-size: 13px; font-weight: 700; z-index: 9999; opacity: 0; pointer-events: none; transition: all 0.4s; box-shadow: 0 5px 15px rgba(0,0,0,0.5); text-align: center;
}
#toast.show { opacity: 1; transform: translate(-50%, 0); }
</style>
</head>
<body>

<div id="toast"></div>

<div class="app">
  <!-- Header -->
  <div class="header">
    <a href="index.html" class="back-btn">← MENU</a>
    <div class="title">BEASTBORNE</div>
    <div style="width: 60px;"></div> <!-- Spacer -->
  </div>

  <!-- HUD -->
  <div class="rpg-hud">
    <div class="rpg-profile">
      <div class="rpg-avatar">🐺</div>
      <div class="rpg-info">
        <div class="rpg-name" id="hudName">TA THE BEAST</div>
        <div class="rpg-class">Level <span id="hudLevel">1</span> Novice Runner</div>
      </div>
    </div>
    
    <div class="bar-container">
      <div class="bar-label" style="color: #ff4444;">HP</div>
      <div class="bar-bg"><div class="bar-fill bar-hp" id="hudHpBar" style="width: 100%;"></div></div>
    </div>
    <div class="bar-container">
      <div class="bar-label" style="color: #ffd700;">EXP</div>
      <div class="bar-bg"><div class="bar-fill bar-exp" id="hudExpBar" style="width: 0%;"></div></div>
    </div>

    <div class="rpg-stats">
      <div class="stat-box">
        <div class="stat-val" id="statStr">0.0</div>
        <div class="stat-lbl">STR (Total KM)</div>
      </div>
      <div class="stat-box">
        <div class="stat-val" id="statAgi">0</div>
        <div class="stat-lbl">AGI (Runs)</div>
      </div>
      <div class="stat-box">
        <div class="stat-val" id="statVit" style="color:var(--green)">100%</div>
        <div class="stat-lbl">VIT (Health)</div>
      </div>
    </div>
  </div>

  <!-- Action -->
  <div class="action-area">
    <button class="btn-quest" id="btnOpenQuest" onclick="openReportModal()">+ ส่งเควสประจำวัน (Report)</button>
  </div>

  <!-- Quest Log -->
  <div class="log-section">
    <div class="log-title">BATTLE HISTORY</div>
    <div id="historyList">
      <!-- Cards rendered via JS -->
    </div>
  </div>
</div>

<!-- Modal Form -->
<div class="modal-overlay" id="questModal">
  <div class="modal-box">
    <div class="m-title">SUBMIT QUEST</div>
    <div class="sync-alert" id="syncAlert">📍 พบพิกัดจาก GPS! กรอกแค่น้ำหนัก & HR</div>
    
    <form id="questForm" onsubmit="saveRPGReport(event)">
      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
        <div class="input-group">
          <label>ระยะทาง (KM) *</label>
          <input type="number" id="inpDist" class="rpg-input" step="0.01" required placeholder="0.00">
        </div>
        <div class="input-group">
          <label>น้ำหนัก (KG)</label>
          <input type="number" id="inpWt" class="rpg-input" step="0.1" placeholder="ตัวเลือก">
        </div>
      </div>
      <div class="input-group">
        <label>Heart Rate (BPM)</label>
        <input type="number" id="inpHR" class="rpg-input" placeholder="ตัวเลือก">
      </div>
      <div class="input-group">
        <label>บันทึกการรบ (Notes)</label>
        <input type="text" id="inpNote" class="rpg-input" placeholder="วันนี้วิ่งหนีหมา...">
      </div>
      <button type="submit" class="btn-submit">CONFIRM QUEST</button>
      <button type="button" class="btn-cancel" onclick="closeModal()">Cancel</button>
    </form>
  </div>
</div>

<script>
const STORE = 'BB_State';
let appState = { history: [], xp: 0, userLevel: 1 };
let pendingGPSData = null; // เก็บข้อมูล GPS ชั่วคราว

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

function fmtDate(ts) {
  const d = new Date(ts);
  return `${d.getDate()}/${d.getMonth()+1}/${d.getFullYear()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}

// 1. โหลดข้อมูลและอัปเดต HUD
function loadState() {
  const data = localStorage.getItem(STORE);
  if (data) appState = JSON.parse(data);
  if (!appState.history) appState.history = [];
  
  updateRPGHud();
  renderHistory();
  checkPendingGPS(); // เช็คว่ามีวิ่ง GPS ค้างไว้ไหม
}

// 2. คำนวณตรรกะเกม RPG
function updateRPGHud() {
  let xp = appState.xp || 0;
  let level = Math.floor(xp / 100) + 1;
  let xpPercent = xp % 100;
  
  let totalKm = appState.history.reduce((sum, log) => sum + (parseFloat(log.dist) || 0), 0);
  let totalRuns = appState.history.length;
  
  // ลอจิก HP แบบง่าย: ถ้ายิ่งวิ่งเยอะ VIT ยิ่งเต็ม (ในที่นี้สมมติให้ 100 เต็มตลอดไปก่อนเพื่อให้เห็นภาพ)
  let hp = 100; 

  document.getElementById('hudLevel').textContent = level;
  document.getElementById('hudExpBar').style.width = xpPercent + '%';
  document.getElementById('hudHpBar').style.width = hp + '%';
  document.getElementById('statStr').textContent = totalKm.toFixed(1);
  document.getElementById('statAgi').textContent = totalRuns;
}

// 3. ระบบ Seamless Pipeline เชื่อมหน้า run.html
function checkPendingGPS() {
  const pendingRaw = localStorage.getItem('Pending_GPS_Run');
  const btn = document.getElementById('btnOpenQuest');
  
  if (pendingRaw) {
    pendingGPSData = JSON.parse(pendingRaw);
    // เปลี่ยนปุ่มเป็นสีเขียวเรืองแสงเพื่อให้รู้ว่ามีเควสรอส่ง
    btn.classList.add('has-pending');
    btn.textContent = '✨ กดเพื่อรับรางวัลจากการวิ่ง GPS!';
    
    // โชว์แจ้งเตือนแบบ Pop-up ครั้งแรกที่เข้ามา
    setTimeout(() => openReportModal(), 500); 
  } else {
    pendingGPSData = null;
    btn.classList.remove('has-pending');
    btn.textContent = '+ ส่งเควสประจำวัน (Manual)';
  }
}

// 4. เปิดฟอร์ม Report
function openReportModal() {
  document.getElementById('questModal').classList.add('active');
  
  const inpDist = document.getElementById('inpDist');
  const inpNote = document.getElementById('inpNote');
  const alert = document.getElementById('syncAlert');

  // ดึงน้ำหนักล่าสุดมาถมให้เลย (User จะได้ไม่ต้องพิมพ์บ่อย)
  if (appState.history.length > 0) {
    document.getElementById('inpWt').value = appState.history[appState.history.length - 1].weight || '';
  }

  // ถ้ามีข้อมูล GPS เข้ามา ให้ล็อคระยะทาง และถมโน้ตให้เลย
  if (pendingGPSData) {
    inpDist.value = pendingGPSData.dist;
    inpDist.disabled = true; // ล็อคไม่ให้โกง
    inpNote.value = pendingGPSData.note || 'รับค่าจาก GPS';
    alert.style.display = 'block';
  } else {
    inpDist.value = '';
    inpDist.disabled = false;
    inpNote.value = '';
    alert.style.display = 'none';
  }
}

function closeModal() {
  document.getElementById('questModal').classList.remove('active');
}

// 5. บันทึกเควส (ผสานข้อมูล GPS + ข้อมูลที่กรอกมือ)
function saveRPGReport(e) {
  e.preventDefault();
  
  // ดึงข้อมูลจากฟอร์ม
  let dist = parseFloat(document.getElementById('inpDist').value) || 0;
  let weight = parseFloat(document.getElementById('inpWt').value) || 0;
  let hr = parseInt(document.getElementById('inpHR').value) || 0;
  let note = document.getElementById('inpNote').value;

  // คำนวณ XP (1 KM = 10 XP)
  let xpGain = Math.floor(dist * 10);
  
  // ดึง Cals และ Timestamp จาก GPS ถ้ามี
  let cals = Math.round(dist * 60);
  let ts = Date.now();
  if (pendingGPSData) {
    cals = pendingGPSData.cals;
    ts = pendingGPSData.dateRaw;
  }

  // สร้าง Quest Log
  const log = {
    dateRaw: ts,
    dist: dist,
    weight: weight,
    hr: hr,
    cals: cals,
    note: note,
    color: 'var(--blue)'
  };

  // บันทึกลง State
  appState.history.push(log);
  appState.xp = (appState.xp || 0) + xpGain;
  localStorage.setItem(STORE, JSON.stringify(appState));

  // ล้าง Pipeline ให้สะอาด
  localStorage.removeItem('Pending_GPS_Run');
  pendingGPSData = null;
  
  closeModal();
  loadState(); // รีเฟรช UI
  showToast(`⚔️ เควสสำเร็จ! ได้รับ +${xpGain} EXP`);
}

// 6. แสดงประวัติ
function renderHistory() {
  const list = document.getElementById('historyList');
  if (appState.history.length === 0) {
    list.innerHTML = '<div style="text-align:center; padding: 40px; color: #555;">ยังไม่มีประวัติการออกรบ</div>';
    return;
  }
  
  // เรียงลำดับจากใหม่ไปเก่า
  const sorted = [...appState.history].sort((a, b) => b.dateRaw - a.dateRaw);
  
  list.innerHTML = sorted.map(log => `
    <div class="quest-card">
      <div class="quest-icon">⚔️</div>
      <div class="quest-details">
        <div class="q-head">
          <div class="q-dist">${log.dist} <span style="font-size:12px;color:#888;">KM</span></div>
          <div class="q-date">${fmtDate(log.dateRaw)}</div>
        </div>
        <div class="q-stats">
          <div>❤️ <span>${log.hr || '--'} bpm</span></div>
          <div>⚖️ <span>${log.weight ? log.weight+' kg' : '--'}</span></div>
          <div>🔥 <span>${log.cals || 0} cal</span></div>
        </div>
        ${log.note ? `<div class="q-note">${log.note}</div>` : ''}
      </div>
    </div>
  `).join('');
}

// Start
window.onload = loadState;
</script>
</body>
</html>
