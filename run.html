<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#000000">
<meta name="mobile-web-app-capable" content="yes">
<title>Run Tracker</title>
<link rel="manifest" href="data:application/json;base64,eyJuYW1lIjoiUnVuIFRyYWNrZXIiLCJzaG9ydF9uYW1lIjoiUnVuIiwiZGlzcGxheSI6InN0YW5kYWxvbmUiLCJiYWNrZ3JvdW5kX2NvbG9yIjoiIzAwMDAwMCIsInRoZW1lX2NvbG9yIjoiIzAwMDAwMCIsInN0YXJ0X3VybCI6Ii4vcnVuLmh0bWwifQ==">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Sarabun:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
:root {
  --bg:#020202; --s1:#0d0d0d; --s2:#141414; --s3:#1c1c1c;
  --fire:#ff6b2b; --fire2:#ff3d00; --amber:#ffb040;
  --green:#22c060; --blue:#3a90f0; --red:#ef3030;
  --t1:#f0ece8; --t2:#8a7060; --t3:#3a2a20;
  --border:rgba(255,107,43,0.08); --border2:rgba(255,107,43,0.18);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--t1);font-family:'Sarabun',sans-serif;-webkit-font-smoothing:antialiased;overflow:hidden}
.app{max-width:430px;margin:0 auto;height:100vh;display:flex;flex-direction:column;position:relative;overflow:hidden}

.screen{position:absolute;inset:0;display:flex;flex-direction:column;transition:transform .4s cubic-bezier(.77,0,.175,1),opacity .4s ease;will-change:transform,opacity}
.screen.off-right{transform:translateX(100%);opacity:0;pointer-events:none}
.screen.off-left{transform:translateX(-100%);opacity:0;pointer-events:none}
.screen.active{transform:translateX(0);opacity:1}

#screenHome{background:var(--bg);justify-content:flex-end;padding-bottom:0}
.home-map-bg{position:absolute;inset:0;z-index:0;overflow:hidden}
.home-map-bg canvas{width:100%;height:100%;opacity:.18}
.home-overlay{position:absolute;inset:0;background:linear-gradient(0deg,rgba(2,2,2,1) 0%,rgba(2,2,2,.85) 40%,rgba(2,2,2,.3) 80%,transparent 100%);z-index:1}
.home-content{position:relative;z-index:2;padding:28px 22px 36px}
.app-eyebrow{font-size:9px;letter-spacing:5px;color:var(--t3);text-transform:uppercase;font-weight:700;margin-bottom:4px}
.app-title{font-family:'Bebas Neue',sans-serif;font-size:38px;letter-spacing:4px;background:linear-gradient(90deg,var(--fire),var(--amber));-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1;margin-bottom:8px}
.run-stats-row{display:flex;gap:10px;margin-bottom:22px}
.run-stat-mini{flex:1;background:rgba(255,255,255,0.04);border:1px solid var(--border2);border-radius:14px;padding:12px;text-align:center}
.run-stat-mini .val{font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--fire);line-height:1}
.run-stat-mini .lbl{font-size:9px;color:var(--t2);font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-top:2px}
.btn-start-run{width:100%;background:linear-gradient(135deg,var(--fire2),var(--fire));color:#fff;font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:4px;padding:18px;border-radius:18px;border:none;cursor:pointer;box-shadow:0 8px 32px rgba(255,107,43,0.35);transition:all .2s;-webkit-user-select:none}
.btn-start-run:active{transform:scale(.97)}
.btn-history{width:100%;background:transparent;border:1px solid var(--border2);color:var(--t2);font-size:13px;font-weight:700;padding:12px;border-radius:14px;cursor:pointer;margin-top:10px;transition:all .2s;font-family:'Sarabun',sans-serif}
.btn-history:active{background:var(--s2)}

#screenTrack{background:var(--bg);flex-direction:column}
#mapContainer{flex:1;position:relative;z-index:1;background:#0a0a0a}
#map{width:100%;height:100%}
.map-overlay-top{position:absolute;top:0;left:0;right:0;z-index:1000;background:linear-gradient(180deg,rgba(2,2,2,.95) 0%,rgba(2,2,2,.6) 60%,transparent 100%);padding:16px 18px 28px;pointer-events:none}
.track-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;pointer-events:all}
.back-btn{width:36px;height:36px;background:rgba(255,255,255,0.08);border:1px solid var(--border2);border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px;-webkit-user-select:none}
.back-btn:active{background:var(--s2)}
.rec-badge{display:flex;align-items:center;gap:6px;background:rgba(239,48,48,0.15);border:1px solid rgba(239,48,48,0.3);border-radius:50px;padding:5px 12px}
.rec-dot{width:8px;height:8px;background:var(--red);border-radius:50%;animation:recblink 1s ease-in-out infinite}
@keyframes recblink{0%,100%{opacity:1}50%{opacity:.2}}
.rec-text{font-size:10px;font-weight:800;color:var(--red);letter-spacing:2px;text-transform:uppercase}
.rec-badge.paused .rec-dot{background:var(--amber);animation:none}
.rec-badge.paused .rec-text{color:var(--amber)}
.map-overlay-bottom{position:absolute;bottom:0;left:0;right:0;z-index:1000;background:linear-gradient(0deg,rgba(2,2,2,1) 0%,rgba(2,2,2,.95) 60%,transparent 100%);padding:12px 18px 0}
.live-metrics{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px}
.metric-box{background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:14px;padding:12px 8px;text-align:center}
.metric-val{font-family:'Bebas Neue',sans-serif;font-size:28px;color:var(--t1);line-height:1}
.metric-val.highlight{color:var(--fire)}
.metric-lbl{font-size:8px;color:var(--t2);font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-top:2px}
.metric-sub{font-size:9px;color:var(--t3);font-weight:600;margin-top:1px}
.big-dist{font-family:'Bebas Neue',sans-serif;font-size:72px;line-height:1;letter-spacing:2px;text-align:center;background:linear-gradient(90deg,var(--fire),var(--amber));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:0}
.big-dist-lbl{text-align:center;font-size:10px;color:var(--t2);font-weight:800;letter-spacing:3px;text-transform:uppercase;margin-bottom:16px}
.ctrl-row{display:flex;gap:10px;margin-bottom:0;padding-bottom:30px}
.ctrl-btn{flex:1;border-radius:16px;border:none;cursor:pointer;font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:2px;padding:14px;transition:all .2s;-webkit-user-select:none}
.ctrl-btn:active{transform:scale(.97)}
.btn-pause{background:var(--s2);border:1px solid var(--border2);color:var(--amber)}
.btn-stop{background:linear-gradient(135deg,#7a0000,var(--red));color:#fff;box-shadow:0 6px 20px rgba(239,48,48,0.25)}
.btn-resume{background:linear-gradient(135deg,#006400,var(--green));color:#fff;box-shadow:0 6px 20px rgba(34,192,96,0.25)}

.gps-indicator{display:flex;align-items:center;gap:5px}
.gps-ring{width:10px;height:10px;border-radius:50%;background:var(--green);animation:gpsPulse 2s ease infinite}
.gps-ring.weak{background:var(--amber);animation:none}
.gps-ring.off{background:var(--red);animation:none}
@keyframes gpsPulse{0%{box-shadow:0 0 0 0 rgba(34,192,96,.5)}70%{box-shadow:0 0 0 8px rgba(34,192,96,0)}100%{box-shadow:0 0 0 0 rgba(34,192,96,0)}}
.gps-text{font-size:9px;color:var(--t2);font-weight:700}

.lap-row{display:flex;gap:8px;overflow-x:auto;padding:6px 0 10px;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.lap-row::-webkit-scrollbar{display:none}
.lap-chip{flex-shrink:0;background:var(--s2);border:1px solid var(--border2);border-radius:10px;padding:5px 10px;font-size:10px;font-weight:700;white-space:nowrap}
.lap-chip .lnum{color:var(--fire);font-family:'Bebas Neue',sans-serif;font-size:14px;line-height:1}
.lap-chip .ltime{color:var(--t2)}
.lap-chip .lpace{color:var(--amber)}

#screenSummary{background:var(--bg);overflow-y:auto;-webkit-overflow-scrolling:touch}
.summary-scroll{padding:24px 18px 40px}
.summary-hero{background:linear-gradient(135deg,rgba(255,107,43,0.12),rgba(255,60,0,0.06),transparent);border:1px solid rgba(255,107,43,0.25);border-radius:22px;padding:22px;margin-bottom:16px;position:relative;overflow:hidden}
.summary-hero::before{content:'🏁';position:absolute;right:-10px;top:-20px;font-size:120px;opacity:.05;pointer-events:none}
.summary-title{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:3px;color:var(--t1);margin-bottom:4px}
.summary-date{font-size:10px;color:var(--t3);font-weight:700;margin-bottom:16px}
.summary-dist{font-family:'Bebas Neue',sans-serif;font-size:80px;line-height:.9;background:linear-gradient(90deg,var(--fire),var(--amber));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:4px;filter:drop-shadow(0 0 20px rgba(255,107,43,0.3))}
.summary-dist-lbl{font-size:11px;color:var(--fire);font-weight:800;letter-spacing:3px;text-transform:uppercase;margin-bottom:12px}
.summary-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px}
.summary-box{background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:14px;padding:14px}
.summary-box .sv{font-family:'Bebas Neue',sans-serif;font-size:26px;color:var(--t1);line-height:1}
.summary-box .sl{font-size:9px;color:var(--t2);font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-top:2px}
.summary-box .ss{font-size:9px;color:var(--t3);margin-top:1px}
.verdict-box{border-radius:16px;padding:16px;margin-bottom:16px}
.verdict-box.great{background:rgba(34,192,96,0.08);border:1px solid rgba(34,192,96,0.2)}
.verdict-box.ok{background:rgba(255,176,64,0.08);border:1px solid rgba(255,176,64,0.2)}
.verdict-box.miss{background:rgba(239,48,48,0.08);border:1px solid rgba(239,48,48,0.2)}
.verdict-emoji{font-size:32px;margin-bottom:8px}
.verdict-title{font-size:16px;font-weight:900;margin-bottom:4px}
.verdict-msg{font-size:12px;line-height:1.7;color:var(--t2)}

#summaryMapWrap{border-radius:16px;overflow:hidden;border:1px solid var(--border2);margin-bottom:16px;position:relative}
#summaryMap{height:200px;background:#0a0a0a}
.map-start-pin{background:var(--green);border-radius:50%;width:12px;height:12px;border:2px solid #fff;box-shadow:0 0 6px rgba(34,192,96,0.6)}
.map-end-pin{background:var(--red);border-radius:50%;width:12px;height:12px;border:2px solid #fff;box-shadow:0 0 6px rgba(239,48,48,0.6)}

.lap-table{background:var(--s1);border:1px solid var(--border);border-radius:16px;overflow:hidden;margin-bottom:16px}
.lap-table-head{display:grid;grid-template-columns:40px 1fr 1fr 1fr;gap:4px;padding:10px 14px;background:var(--s2);border-bottom:1px solid var(--border)}
.lap-table-head span{font-size:8px;font-weight:800;color:var(--t3);text-transform:uppercase;letter-spacing:1px}
.lap-row-item{display:grid;grid-template-columns:40px 1fr 1fr 1fr;gap:4px;padding:10px 14px;border-bottom:1px solid var(--border)}
.lap-row-item:last-child{border-bottom:none}
.lap-row-item span{font-size:12px;font-weight:700}
.lap-num{color:var(--t3);font-family:'Bebas Neue',sans-serif;font-size:16px}
.lap-time-val{color:var(--t1)}
.lap-pace-val{color:var(--fire)}
.lap-km-val{color:var(--blue)}

.elev-wrap{background:var(--s1);border:1px solid var(--border);border-radius:16px;padding:14px;margin-bottom:16px}

.action-row{display:flex;gap:10px;margin-bottom:10px}
.act-btn{flex:1;border-radius:14px;border:none;cursor:pointer;font-family:'Sarabun',sans-serif;font-size:13px;font-weight:800;padding:13px;transition:all .2s;-webkit-user-select:none}
.act-btn:active{transform:scale(.97)}
.act-save{background:linear-gradient(135deg,var(--fire2),var(--fire));color:#fff;box-shadow:0 4px 16px rgba(255,107,43,0.25)}
.act-share{background:var(--s2);border:1px solid var(--border2);color:var(--t2)}
.act-discard{background:transparent;border:1px solid rgba(239,48,48,0.2);color:var(--red);width:100%}

#screenHistory{background:var(--bg);overflow-y:auto;-webkit-overflow-scrolling:touch}
.hist-scroll{padding:20px 18px 40px}
.hist-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.hist-title{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:3px;color:var(--t1)}
.run-card{background:var(--s1);border:1px solid var(--border);border-radius:18px;padding:16px;margin-bottom:10px;cursor:pointer;transition:all .2s;-webkit-user-select:none}
.run-card:active{transform:scale(.98);border-color:var(--fire)}
.run-card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.run-card-dist{font-family:'Bebas Neue',sans-serif;font-size:36px;color:var(--fire);line-height:1}
.run-card-date{font-size:10px;color:var(--t3);font-weight:700}
.run-card-goal-badge{display:inline-flex;align-items:center;gap:4px;font-size:8px;font-weight:800;padding:3px 8px;border-radius:50px;background:rgba(58,144,240,0.1);color:var(--blue);border:1px solid rgba(58,144,240,0.2)}
.run-card-stats{display:flex;gap:12px}
.rc-stat{font-size:11px;font-weight:700;color:var(--t2)}
.rc-stat span{color:var(--t1)}
.empty-state{text-align:center;padding:60px 20px}
.empty-icon{font-size:56px;margin-bottom:14px;opacity:.3}
.empty-msg{font-size:14px;color:var(--t3);font-weight:700}

#toast{position:fixed;top:60px;left:50%;transform:translateX(-50%) translateY(-10px);background:var(--s2);border:1px solid var(--border2);color:var(--t1);padding:10px 20px;border-radius:50px;font-size:12px;font-weight:700;z-index:9999;opacity:0;pointer-events:none;transition:all .4s cubic-bezier(.34,1.56,.64,1);white-space:nowrap;max-width:340px;text-align:center}
#toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
#toast.ok{border-color:var(--green);color:var(--green)}
#toast.err{border-color:var(--red);color:var(--red)}
#toast.fire{border-color:var(--fire);color:var(--fire)}

/* ── Leaflet dark/RPG theme overrides ── */
.leaflet-container{background:#0a0a0a!important}
.leaflet-tile {
  filter: sepia(0.85) contrast(0.9) saturate(0.6) hue-rotate(-20deg) brightness(0.7) !important;
  transition: filter 0.3s ease;
}
.leaflet-control-zoom a{background:var(--s2)!important;border-color:var(--border2)!important;color:var(--t1)!important}
.leaflet-control-attribution{display:none!important}
.leaflet-overlay-pane path {
  filter: drop-shadow(0px 0px 4px rgba(255, 107, 43, 0.8));
}

@media(max-width:220px),(max-height:280px){
  .metric-val{font-size:20px}.big-dist{font-size:50px}.app-title{font-size:26px}
  .ctrl-btn{font-size:13px;padding:10px}.summary-dist{font-size:56px}
  .summary-title,.hist-title{font-size:20px}
}

@keyframes pulseBig{0%,100%{text-shadow:0 0 0 transparent}50%{text-shadow:0 0 30px rgba(255,107,43,.5)}}
.running-pulse{animation:pulseBig 2s ease infinite}

#countdown{position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:9000;display:flex;align-items:center;justify-content:center;flex-direction:column}
.cd-num{font-family:'Bebas Neue',sans-serif;font-size:120px;line-height:1;background:linear-gradient(90deg,var(--fire),var(--amber));-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:cdZoom .9s ease both}
@keyframes cdZoom{0%{transform:scale(2);opacity:0}100%{transform:scale(1);opacity:1}}
.cd-sub{font-size:12px;font-weight:700;color:var(--t2);letter-spacing:3px;text-transform:uppercase;margin-top:8px}
#countdown.hide{display:none}
</style>
</head>
<body>

<div id="toast"></div>
<div id="countdown" class="hide">
  <div class="cd-num" id="cdNum">3</div>
  <div class="cd-sub">เตรียมพร้อม...</div>
</div>

<div class="app">

  <div class="screen active" id="screenHome">
    <div class="home-map-bg">
      <canvas id="homeBgCanvas"></canvas>
    </div>
    <div class="home-overlay"></div>
    <div class="home-content">
      <div class="app-eyebrow">GPS Run Tracker</div>
      <div class="app-title">RUN LOG</div>
      <div class="run-stats-row" id="homeStats">
        <div class="run-stat-mini">
          <div class="val" id="statTotalRuns">0</div>
          <div class="lbl">วิ่งรวม</div>
        </div>
        <div class="run-stat-mini">
          <div class="val" id="statTotalKm">0.0</div>
          <div class="lbl">กิโลรวม</div>
        </div>
        <div class="run-stat-mini">
          <div class="val" id="statBestPace">--</div>
          <div class="lbl">Best Pace</div>
        </div>
      </div>
      <button class="btn-start-run" onclick="startCountdown()">🏃 เริ่มวิ่ง</button>
      <button class="btn-history" onclick="showScreen('screenHistory')">📋 ประวัติการวิ่ง</button>
      <div style="text-align:center;margin-top:14px">
        <a href="index.html" style="font-size:11px;color:var(--t3);text-decoration:none;font-weight:700">← กลับเมนูหลัก</a>
      </div>
    </div>
  </div>

  <div class="screen off-right" id="screenTrack">
    <div id="mapContainer">
      <div id="map"></div>
      <div class="map-overlay-top">
        <div class="track-header">
          <div class="gps-indicator">
            <div class="gps-ring" id="gpsRing"></div>
            <span class="gps-text" id="gpsText">รอ GPS...</span>
          </div>
          <div class="rec-badge" id="recBadge">
            <div class="rec-dot"></div>
            <span class="rec-text">LIVE</span>
          </div>
        </div>
      </div>
      <div class="map-overlay-bottom">
        <div style="text-align:center;padding:4px 0 8px">
          <div class="big-dist running-pulse" id="liveDist">0.00</div>
          <div class="big-dist-lbl">กิโลเมตร</div>
        </div>
        <div class="live-metrics">
          <div class="metric-box">
            <div class="metric-val highlight" id="livePace">--:--</div>
            <div class="metric-lbl">Pace</div>
            <div class="metric-sub">min/km</div>
          </div>
          <div class="metric-box">
            <div class="metric-val" id="liveTime">00:00</div>
            <div class="metric-lbl">เวลา</div>
            <div class="metric-sub">นาที:วิ</div>
          </div>
          <div class="metric-box">
            <div class="metric-val" id="liveHR">--</div>
            <div class="metric-lbl">Heart</div>
            <div class="metric-sub">BPM</div>
          </div>
        </div>
        <div class="lap-row" id="lapRow" style="display:none"></div>
        <div class="ctrl-row">
          <button class="ctrl-btn btn-pause" id="btnPauseResume" onclick="togglePause()">⏸ หยุด</button>
          <button class="ctrl-btn btn-stop" onclick="confirmStop()">⏹ จบการวิ่ง</button>
        </div>
        <div style="display:flex;justify-content:space-between;align-items:center;padding:6px 0 24px">
          <button onclick="addLap()" style="background:transparent;border:none;font-size:11px;color:var(--t3);font-weight:700;cursor:pointer;padding:4px 0">+ Lap</button>
          <button onclick="centerMap()" style="background:transparent;border:none;font-size:11px;color:var(--t3);font-weight:700;cursor:pointer;padding:4px 0">📍 จุดปัจจุบัน</button>
        </div>
      </div>
    </div>
  </div>

  <div class="screen off-right" id="screenSummary">
    <div class="summary-scroll" id="summaryContent"></div>
  </div>

  <div class="screen off-right" id="screenHistory">
    <div class="hist-scroll">
      <div class="hist-header">
        <div class="hist-title">RUN HISTORY</div>
        <button onclick="showScreen('screenHome')" style="background:transparent;border:none;color:var(--t3);font-size:22px;cursor:pointer">×</button>
      </div>
      <div id="historyList"></div>
    </div>
  </div>

</div>

<script>
const STORE = 'RunTrackerV2';
let session = {
  active: false, paused: false, startTime: null, pausedAt: null, pausedDuration: 0,
  coords: [], distance: 0, laps: [], lapStartDist: 0, lapStartTime: null,
  currentSpeed: 0, lastCoord: null, watchId: null, timerIv: null, gpsFix: false, gpsAccuracy: 999,
};

let db = { runs: [] };
let trackMap = null, trackPolyline = null, trackMarker = null, summaryMap = null, summaryPolyline = null;

const $ = id => document.getElementById(id);
const save = () => localStorage.setItem(STORE, JSON.stringify(db));
const load = () => { try { const d = localStorage.getItem(STORE); if (d) db = JSON.parse(d); } catch(e) {} };

let toastTO;
function showToast(msg, type='ok') {
  const t = $('toast'); t.textContent = msg; t.className = type + ' on';
  clearTimeout(toastTO); toastTO = setTimeout(() => t.classList.remove('on'), 3200);
}

function fmtTime(seconds) {
  const h = Math.floor(seconds / 3600), m = Math.floor((seconds % 3600) / 60), s = Math.floor(seconds % 60);
  if (h > 0) return `${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

function fmtPace(meterPerSec) {
  if (!meterPerSec || meterPerSec < 0.1) return '--:--';
  const secPerKm = 1000 / meterPerSec;
  const m = Math.floor(secPerKm / 60), s = Math.floor(secPerKm % 60);
  return `${m}:${String(s).padStart(2,'0')}`;
}

function fmtDate(ts) {
  const d = new Date(ts), days = ['อาทิตย์','จันทร์','อังคาร','พุธ','พฤหัสบดี','ศุกร์','เสาร์'];
  return `วัน${days[d.getDay()]} ${d.getDate()}/${d.getMonth()+1}/${d.getFullYear()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}

function haversine(lat1, lng1, lat2, lng2) {
  const R = 6371000, dLat = (lat2 - lat1) * Math.PI / 180, dLng = (lng2 - lng1) * Math.PI / 180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function rollingAvgSpeed(coords, window=5) {
  if (coords.length < 2) return 0;
  const recent = coords.slice(-window);
  if (recent.length < 2) return 0;
  const totalDist = recent.slice(1).reduce((s, c, i) => s + haversine(recent[i].lat, recent[i].lng, c.lat, c.lng), 0);
  const totalTime = (recent[recent.length-1].ts - recent[0].ts) / 1000;
  return totalTime > 0 ? totalDist / totalTime : 0;
}

function elapsedSec() {
  if (!session.startTime) return 0;
  const base = Date.now() - session.startTime - session.pausedDuration;
  return Math.max(0, base / 1000);
}

const SCREENS = ['screenHome','screenTrack','screenSummary','screenHistory'];
function showScreen(id) {
  SCREENS.forEach(s => {
    const el = $(s);
    if (s === id) { el.classList.add('active'); el.classList.remove('off-right','off-left'); }
    else { el.classList.remove('active'); el.classList.add('off-right'); }
  });
  if (id === 'screenHistory') renderHistory();
  if (id === 'screenHome') updateHomeStats();
}

function updateHomeStats() {
  const runs = db.runs;
  $('statTotalRuns').textContent = runs.length;
  const totalKm = runs.reduce((s, r) => s + r.distance/1000, 0);
  $('statTotalKm').textContent = totalKm.toFixed(1);
  let bestPaceMs = 0;
  runs.forEach(r => { if (r.avgSpeed > bestPaceMs) bestPaceMs = r.avgSpeed; });
  $('statBestPace').textContent = bestPaceMs > 0 ? fmtPace(bestPaceMs) : '--';
  drawHomeBg();
}

function drawHomeBg() {
  const canvas = $('homeBgCanvas');
  if (!canvas || !db.runs.length) return;
  const rect = canvas.parentElement.getBoundingClientRect();
  canvas.width = rect.width || 430; canvas.height = rect.height || 400;
  const ctx = canvas.getContext('2d'); ctx.clearRect(0, 0, canvas.width, canvas.height);
  const lastRun = db.runs[db.runs.length - 1];
  if (!lastRun || !lastRun.coords || lastRun.coords.length < 2) return;
  const lats = lastRun.coords.map(c => c.lat), lngs = lastRun.coords.map(c => c.lng);
  const minLat = Math.min(...lats), maxLat = Math.max(...lats), minLng = Math.min(...lngs), maxLng = Math.max(...lngs);
  const pad = 40, scaleX = (canvas.width - pad*2) / Math.max(maxLng - minLng, 0.0001), scaleY = (canvas.height - pad*2) / Math.max(maxLat - minLat, 0.0001);
  const scale = Math.min(scaleX, scaleY);
  ctx.beginPath(); ctx.strokeStyle = 'rgba(255,107,43,0.6)'; ctx.lineWidth = 2; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
  lastRun.coords.forEach((c, i) => {
    const x = pad + (c.lng - minLng) * scale, y = canvas.height - pad - (c.lat - minLat) * scale;
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  });
  ctx.stroke();
}

function startCountdown() {
  const cd = $('countdown'); cd.classList.remove('hide');
  let count = 3; $('cdNum').textContent = count;
  const iv = setInterval(() => {
    count--;
    if (count <= 0) {
      clearInterval(iv); $('cdNum').textContent = 'GO!';
      setTimeout(() => { cd.classList.add('hide'); beginRun(); }, 700);
    } else {
      $('cdNum').textContent = count;
      const n = $('cdNum'); n.style.animation = 'none'; void n.offsetWidth; n.style.animation = 'cdZoom .9s ease both';
    }
  }, 1000);
}

function initTrackMap() {
  if (trackMap) { trackMap.remove(); trackMap = null; }
  trackMap = L.map($('map'), { zoomControl: true, attributionControl: false, maxZoom: 19 });
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19, subdomains: 'abc' }).addTo(trackMap);
  trackPolyline = L.polyline([], { color: '#ff6b2b', weight: 5, opacity: 0.9, smoothFactor: 1, lineCap: 'round', lineJoin: 'round' }).addTo(trackMap);
  const markerIcon = L.divIcon({ className: '', html: `<div style="width:18px;height:18px;border-radius:50%;background:#ff6b2b;border:3px solid #fff;box-shadow:0 0 10px rgba(255,107,43,.8)"></div>`, iconSize: [18, 18], iconAnchor: [9, 9] });
  trackMarker = L.marker([13.75, 100.5], { icon: markerIcon, zIndexOffset: 1000 }).addTo(trackMap);
  trackMap.setView([13.75, 100.5], 16);
}

function initSummaryMap(run) {
  if (summaryMap) { summaryMap.remove(); summaryMap = null; }
  if (!run.coords || run.coords.length < 2) return;
  summaryMap = L.map($('summaryMap'), { zoomControl: false, attributionControl: false, dragging: true, scrollWheelZoom: false });
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19 }).addTo(summaryMap);
  summaryPolyline = L.polyline(run.coords.map(c => [c.lat, c.lng]), { color: '#ff6b2b', weight: 4, opacity: 0.9, smoothFactor: 1 }).addTo(summaryMap);
  const startIcon = L.divIcon({ className:'', html:`<div style="width:12px;height:12px;border-radius:50%;background:#22c060;border:2px solid #fff;box-shadow:0 0 6px rgba(34,192,96,.8)"></div>`, iconSize:[12,12], iconAnchor:[6,6] });
  const endIcon = L.divIcon({ className:'', html:`<div style="width:12px;height:12px;border-radius:50%;background:#ef3030;border:2px solid #fff;box-shadow:0 0 6px rgba(239,48,48,.8)"></div>`, iconSize:[12,12], iconAnchor:[6,6] });
  const c = run.coords;
  L.marker([c[0].lat, c[0].lng], {icon: startIcon}).addTo(summaryMap);
  L.marker([c[c.length-1].lat, c[c.length-1].lng], {icon: endIcon}).addTo(summaryMap);
  summaryMap.fitBounds(summaryPolyline.getBounds(), { padding: [20, 20] });
}

function beginRun() {
  showScreen('screenTrack');
  session = { active: true, paused: false, startTime: Date.now(), pausedAt: null, pausedDuration: 0, coords: [], distance: 0, laps: [], lapStartDist: 0, lapStartTime: Date.now(), currentSpeed: 0, lastCoord: null, watchId: null, timerIv: null, gpsFix: false, gpsAccuracy: 999 };
  setTimeout(() => {
    initTrackMap();
    if (!navigator.geolocation) { showToast('GPS ไม่รองรับบนอุปกรณ์นี้', 'err'); startFakeGPS(); }
    else { session.watchId = navigator.geolocation.watchPosition(onGPSUpdate, onGPSError, { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }); }
  }, 400);
  session.timerIv = setInterval(updateLiveUI, 1000);
  $('recBadge').classList.remove('paused'); $('btnPauseResume').className = 'ctrl-btn btn-pause'; $('btnPauseResume').textContent = '⏸ หยุด'; $('lapRow').style.display = 'none';
}

function onGPSUpdate(pos) {
  const { latitude: lat, longitude: lng, altitude: alt, accuracy: acc } = pos.coords;
  const ts = pos.timestamp;

  if (acc > 35 && session.gpsFix) return; 

  session.gpsAccuracy = acc;
  session.gpsFix = true;
  updateGPSIndicator(acc);
  
  if (session.paused) return;

  const coord = { lat, lng, alt: alt || 0, ts, acc };

  if (session.lastCoord) {
    const d = haversine(session.lastCoord.lat, session.lastCoord.lng, lat, lng);
    const timeDiff = (ts - session.lastCoord.ts) / 1000;

    if (timeDiff > 0) {
      const speedMPS = d / timeDiff;
      if (speedMPS > 9) return; 
    }
    if (d < 2.5) return; 

    session.distance += d;
  }

  session.coords.push(coord);
  session.lastCoord = coord;

  if (trackPolyline) {
    const latlngs = session.coords.map(c => [c.lat, c.lng]);
    trackPolyline.setLatLngs(latlngs);
    trackMarker.setLatLng([lat, lng]);
    if (session.coords.length <= 3) trackMap.setView([lat, lng], 17);
  }

  session.currentSpeed = rollingAvgSpeed(session.coords, 5); 
}

function onGPSError(err) { updateGPSIndicator(999); if (err.code === 1) showToast('ไม่อนุญาต GPS — ใช้โหมด Demo', 'err'); startFakeGPS(); }

function updateGPSIndicator(acc) {
  const ring = $('gpsRing'), txt = $('gpsText');
  if (acc < 20) { ring.className = 'gps-ring'; txt.textContent = `GPS ±${Math.round(acc)}m`; }
  else if (acc < 60) { ring.className = 'gps-ring weak'; txt.textContent = `GPS อ่อน ±${Math.round(acc)}m`; }
  else { ring.className = 'gps-ring off'; txt.textContent = 'GPS ไม่แม่น'; }
}

function startFakeGPS() {
  if (session._fakeIv) return;
  let fakeLat = 13.7500 + Math.random()*0.005, fakeLng = 100.5000 + Math.random()*0.005, angle = Math.random() * Math.PI * 2;
  session._fakeIv = setInterval(() => {
    if (!session.active || session.paused) return;
    angle += (Math.random()-0.5)*0.3; fakeLat += Math.cos(angle)*0.00005; fakeLng += Math.sin(angle)*0.00005;
    onGPSUpdate({ coords:{ latitude:fakeLat, longitude:fakeLng, altitude:10, accuracy:15, speed:2.5 }, timestamp:Date.now() });
  }, 1500);
}

function updateLiveUI() {
  if (!session.active) return;
  const elapsed = elapsedSec();
  $('liveTime').textContent = fmtTime(elapsed);
  $('liveDist').textContent = (session.distance / 1000).toFixed(2);
  $('livePace').textContent = fmtPace(session.currentSpeed);
  $('liveHR').textContent = '--';
}

function centerMap() { if (trackMap && session.lastCoord) trackMap.setView([session.lastCoord.lat, session.lastCoord.lng], 17, { animate: true }); }

function addLap() {
  const elapsed = elapsedSec(), lapDist = session.distance - session.lapStartDist, lapTime = elapsed - (session.lapStartTime || 0), lapSpeed = lapTime > 0 ? lapDist / lapTime : 0;
  session.laps.push({ num: session.laps.length + 1, dist: lapDist, time: lapTime, pace: lapSpeed });
  session.lapStartDist = session.distance; session.lapStartTime = elapsed;
  renderLapChips(); showToast(`Lap ${session.laps.length} บันทึกแล้ว`, 'fire');
}

function renderLapChips() {
  const row = $('lapRow'); row.style.display = 'flex';
  row.innerHTML = session.laps.map(l => `<div class="lap-chip"><div class="lnum">Lap ${l.num}</div><div class="ltime">${fmtTime(l.time)}</div><div class="lpace">${fmtPace(l.pace)}/km</div></div>`).join('');
}

function togglePause() {
  if (session.paused) { session.pausedDuration += Date.now() - session.pausedAt; session.paused = false; $('recBadge').classList.remove('paused'); $('btnPauseResume').className = 'ctrl-btn btn-pause'; $('btnPauseResume').textContent = '⏸ หยุด'; }
  else { session.pausedAt = Date.now(); session.paused = true; $('recBadge').classList.add('paused'); $('btnPauseResume').className = 'ctrl-btn btn-resume'; $('btnPauseResume').textContent = '▶ วิ่งต่อ'; }
}

function confirmStop() { if (session.distance < 100 && !confirm('ระยะทางน้อยมาก (<100m) ยืนยันจบการวิ่ง?')) return; stopRun(); }

function stopRun() {
  session.active = false; clearInterval(session.timerIv); clearInterval(session._fakeIv);
  if (session.watchId) navigator.geolocation.clearWatch(session.watchId);
  const elapsed = elapsedSec(), avgSpeed = elapsed > 0 ? session.distance / elapsed : 0;
  const run = { id: Date.now(), ts: session.startTime, distance: session.distance, duration: elapsed, avgSpeed, coords: session.coords, laps: session.laps, elevGain: calcElevGain(session.coords) };
  showSummary(run, true);
}

function saveRun(run) {
  db.runs.push(run); db.runs.sort((a, b) => b.ts - a.ts); save(); showToast('✅ บันทึกการวิ่งแล้ว!', 'ok'); updateHomeStats();
}

function discardRun() { if (confirm('ยืนยันลบการวิ่งครั้งนี้?')) { showScreen('screenHome'); updateHomeStats(); } }

function calcElevGain(coords) {
  let gain = 0; for (let i = 1; i < coords.length; i++) { const diff = (coords[i].alt || 0) - (coords[i-1].alt || 0); if (diff > 0) gain += diff; } return Math.round(gain);
}

function showSummary(run, isNew = false) {
  showScreen('screenSummary');
  const km = run.distance / 1000, elapsed = run.duration, avgPace = fmtPace(run.avgSpeed);
  let verdictClass, verdictEmoji, verdictTitle, verdictMsg;
  if (km >= 10) { verdictClass='great'; verdictEmoji='🏆'; verdictTitle='ยอดเยี่ยมมาก!'; verdictMsg='วิ่งได้ 10K ขึ้นไป! ฝึกต่อไปแบบนี้แชมป์มาราธอนแน่!'; }
  else if (km >= 5) { verdictClass='great'; verdictEmoji='🔥'; verdictTitle='แจ่มมากเลย!'; verdictMsg='5K ขึ้นไป! ฐานกำลังแน่น เดินหน้าต่อได้เลย!'; }
  else if (km >= 2) { verdictClass='ok'; verdictEmoji='💪'; verdictTitle='ดี ทำต่อไป!'; verdictMsg='การเริ่มต้นทุกครั้งคือชัยชนะ ครั้งหน้าดันให้ไกลขึ้น!'; }
  else { verdictClass='miss'; verdictEmoji='😤'; verdictTitle='แค่นี้พอแล้วเหรอ?!'; verdictMsg='วิ่งแค่นั้นพอมั้ย? ครั้งหน้าอย่าหยุดเร็วขนาดนี้! มาราธอนรอ!'; }
  let lapTableHTML = '';
  if (run.laps && run.laps.length > 0) {
    lapTableHTML = `<p style="font-size:9px;font-weight:800;letter-spacing:3px;color:var(--t3);text-transform:uppercase;margin-bottom:8px">Lap Analysis</p><div class="lap-table"><div class="lap-table-head"><span>Lap</span><span>เวลา</span><span>Pace</span><span>km</span></div>${run.laps.map(l => `<div class="lap-row-item"><span class="lap-num">${l.num}</span><span class="lap-time-val">${fmtTime(l.time)}</span><span class="lap-pace-val">${fmtPace(l.pace)}</span><span class="lap-km-val">${(l.dist/1000).toFixed(2)}</span></div>`).join('')}</div>`;
  }
  let elevHTML = '';
  if (run.coords && run.coords.length > 1 && run.elevGain > 0) {
    elevHTML = `<div class="elev-wrap"><p style="font-size:9px;font-weight:800;letter-spacing:2px;color:var(--t3);text-transform:uppercase;margin-bottom:8px">Elevation Profile</p><canvas id="elevChart" height="50" style="width:100%"></canvas><p style="font-size:9px;color:var(--t2);margin-top:6px">↑ Elevation Gain: <b style="color:var(--amber)">${run.elevGain}m</b></p></div>`;
  }
  const summaryHTML = `
    <div class="summary-hero"><div class="summary-title">RUN COMPLETE</div><div class="summary-date">${fmtDate(run.ts)}</div><div class="summary-dist">${km.toFixed(2)}</div><div class="summary-dist-lbl">กิโลเมตร</div>
      <div class="summary-grid">
        <div class="summary-box"><div class="sv">${fmtTime(elapsed)}</div><div class="sl">เวลารวม</div><div class="ss">h:mm:ss</div></div>
        <div class="summary-box"><div class="sv">${avgPace}</div><div class="sl">เพซเฉลี่ย</div><div class="ss">min/km</div></div>
        <div class="summary-box"><div class="sv">${(run.avgSpeed * 3.6).toFixed(1)}</div><div class="sl">ความเร็ว</div><div class="ss">km/h</div></div>
        <div class="summary-box"><div class="sv">${run.elevGain || 0}</div><div class="sl">Elev Gain</div><div class="ss">เมตร</div></div>
        <div class="summary-box"><div class="sv">${run.laps ? run.laps.length : 0}</div><div class="sl">Laps</div><div class="ss">รอบ</div></div>
        <div class="summary-box"><div class="sv">${Math.round(km * 60)}</div><div class="sl">Cal (est.)</div><div class="ss">kcal</div></div>
      </div>
    </div>
    <div class="verdict-box ${verdictClass}"><div class="verdict-emoji">${verdictEmoji}</div><div class="verdict-title" style="color:${verdictClass==='great'?'var(--green)':verdictClass==='ok'?'var(--amber)':'var(--fire)'}">${verdictTitle}</div><div class="verdict-msg">${verdictMsg}</div></div>
    <p style="font-size:9px;font-weight:800;letter-spacing:3px;color:var(--t3);text-transform:uppercase;margin-bottom:8px">เส้นทางวิ่ง</p>
    <div id="summaryMapWrap"><div id="summaryMap"></div></div>
    ${elevHTML} ${lapTableHTML}
    ${isNew ? `<div class="action-row"><button class="act-btn act-save" onclick="saveAndExit(${JSON.stringify(run).replace(/"/g,'&quot;')})">💾 บันทึก</button><button class="act-btn act-share" onclick="shareRun(${JSON.stringify(run).replace(/"/g,'&quot;')})">📤 แชร์</button></div><button class="act-btn act-discard" onclick="discardRun()">🗑 ไม่บันทึก</button>` : `<button class="act-btn act-share" style="width:100%;margin-bottom:10px" onclick="shareRunById(${run.id})">📤 แชร์ผลวิ่ง</button><button class="act-btn act-discard" onclick="showScreen('screenHistory')">← กลับประวัติ</button>`}`;
  $('summaryContent').innerHTML = summaryHTML;
  setTimeout(() => { initSummaryMap(run); if (run.coords && run.coords.length > 1 && run.elevGain > 0) drawElevChart(run.coords); }, 300);
}

function saveAndExit(run) {
  saveRun(run); 

  const activeMode = localStorage.getItem('selectedMode');
  const km = parseFloat((run.distance / 1000).toFixed(2));
  const cals = Math.round(km * 60);
  const xpGain = Math.floor(km * 10); 
  const dateRaw = run.ts;

  const battleLog = {
    dateRaw: dateRaw,
    dateStr: new Date(dateRaw).toLocaleDateString('th-TH'),
    weight: 0,
    dist: km,
    hr: 0, 
    diet: 'normal',
    cals: cals,
    note: `[GPS System] วิ่ง ${km}KM | Pace ${fmtPace(run.avgSpeed)} | เวลา ${fmtTime(run.duration)}`,
    feedback: activeMode === 'draglak' ? 'โค้ช: เออ! อย่างน้อยวันนี้มึงก็ลากสังขารออกไปวิ่งได้!' : 'ระบบ: ได้รับ XP จากการออกรบจริง!',
    color: activeMode === 'draglak' ? 'var(--green)' : 'var(--blue)',
    emoji: '📍'
  };

  if (activeMode === 'beastborne' || activeMode === 'draglak') {
    const storeKey = activeMode === 'beastborne' ? 'BB_State' : 'GJL_State';
    let appState = JSON.parse(localStorage.getItem(storeKey)) || {};
    
    if (!appState.history) appState.history = [];
    
    battleLog.weight = appState.history.length > 0 
      ? appState.history[appState.history.length - 1].weight 
      : (appState.startWt || 0);

    appState.history.push(battleLog);
    appState.xp = (appState.xp || 0) + xpGain;
    appState.userLevel = Math.floor(appState.xp / 100) + 1; 

    localStorage.setItem(storeKey, JSON.stringify(appState));
    localStorage.setItem('pendingRunSync', JSON.stringify({ xp: xpGain, mode: activeMode }));

    window.location.href = `${activeMode}.html`;
    return;
  }

  showScreen('screenHome');
  updateHomeStats();
}

function drawElevChart(coords) {
  const canvas = $('elevChart'); if (!canvas) return;
  const alts = coords.filter(c => c.alt !== undefined && c.alt !== null).map(c => c.alt || 0); if (!alts.length) return;
  const w = canvas.offsetWidth || 340, h = 50; canvas.width = w; canvas.height = h;
  const ctx = canvas.getContext('2d'), minA = Math.min(...alts), maxA = Math.max(...alts), range = Math.max(maxA - minA, 1), pad = 4;
  const pts = alts.map((a, i) => ({ x: pad + (i / Math.max(alts.length - 1, 1)) * (w - pad*2), y: pad + (1 - (a - minA) / range) * (h - pad*2) }));
  const grad = ctx.createLinearGradient(0, 0, 0, h); grad.addColorStop(0, 'rgba(255,176,64,0.3)'); grad.addColorStop(1, 'rgba(255,176,64,0)');
  ctx.beginPath(); pts.forEach((p, i) => i === 0 ? ctx.moveTo(p.x, p.y) : ctx.lineTo(p.x, p.y)); ctx.lineTo(pts[pts.length-1].x, h); ctx.lineTo(pts[0].x, h); ctx.closePath();
  ctx.fillStyle = grad; ctx.fill();
  ctx.beginPath(); ctx.strokeStyle = '#ffb040'; ctx.lineWidth = 2; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
  pts.forEach((p, i) => i === 0 ? ctx.moveTo(p.x, p.y) : ctx.lineTo(p.x, p.y)); ctx.stroke();
}

function renderHistory() {
  const list = $('historyList');
  if (!db.runs.length) { list.innerHTML = `<div class="empty-state"><div class="empty-icon">🏃</div><div class="empty-msg">ยังไม่มีประวัติการวิ่ง<br>กดเริ่มวิ่งเพื่อบันทึกครั้งแรก!</div></div>`; return; }
  list.innerHTML = db.runs.map(r => {
    const km = (r.distance / 1000).toFixed(2), pace = fmtPace(r.avgSpeed);
    return `<div class="run-card" onclick="viewRun(${r.id})"><div class="run-card-top"><div><div class="run-card-dist">${km}<span style="font-size:18px;color:var(--t2)"> KM</span></div><div class="run-card-date">${fmtDate(r.ts)}</div></div><div style="text-align:right"><div style="font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--amber)">${pace}</div><div style="font-size:9px;color:var(--t2);font-weight:700">min/km</div></div></div><div class="run-card-stats"><div class="rc-stat">⏱ <span>${fmtTime(r.duration)}</span></div><div class="rc-stat">↑ <span>${r.elevGain || 0}m</span></div><div class="rc-stat">🔄 <span>${r.laps ? r.laps.length : 0} lap</span></div><div class="rc-stat">🔥 <span>${Math.round((r.distance/1000)*60)} kcal</span></div></div></div>`;
  }).join('');
}

function viewRun(id) { const run = db.runs.find(r => r.id === id); if (run) showSummary(run, false); }
function shareRunById(id) { const run = db.runs.find(r => r.id === id); if (run) shareRun(run); }
function shareRun(run) {
  const km = (run.distance / 1000).toFixed(2), pace = fmtPace(run.avgSpeed), text = `🏃 วิ่ง ${km} KM | Pace ${pace} min/km | ${fmtTime(run.duration)}\n#RunTracker #BeastBorne #วิ่ง`;
  if (navigator.share) { navigator.share({ title: `วิ่ง ${km} KM`, text }).catch(() => copyToClipboard(text)); } else { copyToClipboard(text); }
}
function copyToClipboard(text) {
  const ta = document.createElement('textarea'); ta.value = text; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta); showToast('📋 ก๊อปปี้ข้อความแล้ว!', 'ok');
}

load(); updateHomeStats();
window.addEventListener('beforeunload', () => { if (session.active) stopRun(); });
</script>
</body>
</html>
